<div style="padding: 2rem;">

  <div style="margin-bottom: 1rem;">
    <p-button 
      [label]="showForm ? 'Annuler' : 'Inscrire un membre'" 
      (onClick)="showForm = !showForm" />
  </div>

  @if (showForm) {
    <p-card header="Inscrire un nouveau membre" styleClass="margin-bottom: 2rem; display: block;">
      <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div style="display: flex; gap: 1.5rem;">
          <p-floatlabel style="flex: 1;">
            <input pInputText id="nom" [(ngModel)]="nouveauMembre.nom" style="width: 100%;" />
            <label for="nom">Nom</label>
          </p-floatlabel>
          <p-floatlabel style="flex: 1;">
            <input pInputText id="prenom" [(ngModel)]="nouveauMembre.prenom" style="width: 100%;" />
            <label for="prenom">Prénom</label>
          </p-floatlabel>
        </div>
        <div style="display: flex; gap: 1.5rem;">
          <p-floatlabel style="flex: 1;">
            <input pInputText id="courriel" [(ngModel)]="nouveauMembre.courriel" style="width: 100%;" />
            <label for="courriel">Email</label>
          </p-floatlabel>
          <p-floatlabel style="flex: 1;">
            <input pInputText id="nomUtilisateur" [(ngModel)]="nouveauMembre.nomUtilisateur" style="width: 100%;" />
            <label for="nomUtilisateur">Nom d'utilisateur</label>
          </p-floatlabel>
        </div>
        <div style="display: flex; gap: 1.5rem;">
          <p-floatlabel style="flex: 1;">
            <p-password id="motDePasse" [(ngModel)]="nouveauMembre.motDePasse" [feedback]="false" style="width: 100%;" />
            <label for="motDePasse">Mot de passe</label>
          </p-floatlabel>
          <p-floatlabel style="flex: 1;">
            <p-inputnumber id="niveau" [(ngModel)]="nouveauMembre.niveauExpertise" [min]="1" [max]="5" style="width: 100%;" />
            <label for="niveau">Niveau (1-5)</label>
          </p-floatlabel>
        </div>
        <p-button label="Inscrire" (onClick)="inscrire()" />
      </div>
    </p-card>
  }

  <h2>Liste des membres</h2>
  <p-table [value]="membres" [paginator]="true" [rows]="10">
    <ng-template pTemplate="header">
      <tr>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Email</th>
        <th>Niveau</th>
        <th>Rôle</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-membre>
      <tr>
        <td>{{ membre.nom }}</td>
        <td>{{ membre.prenom }}</td>
        <td>{{ membre.courriel }}</td>
        <td>{{ membre.niveauExpertise }}</td>
        <td>{{ membre.role }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
